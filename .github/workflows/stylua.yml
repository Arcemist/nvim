# Check Lua Formatting
name: Check Lua Formatting
on: 
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  stylua-check:
    name: Stylua Check
    runs-on: ubuntu-latest
    steps:
      - name: Stylua Check
        - uses: actions/checkout@v4
        - uses: JohnnyMorganz/stylua-action@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            version: latest
            args: --check .

